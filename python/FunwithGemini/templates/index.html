{% extends "layout.html" %}

{% block main %}
    <!-- Sidebar Form -->
    <div style="width: 300px; border: 1px solid #eee; padding: 20px; border-radius: 15px; height: fit-content;">
        <h3>Sell Something</h3>
        <form action="/create" method="POST" enctype="multipart/form-data">
            <input type="text" name="make" placeholder="Make" style="width:100%; margin-bottom:10px;" required>
            <input type="number" name="price" placeholder="Price ($)" style="width:100%; margin-bottom:10px;" required>
            <input type="file" name="photos" multiple style="margin-bottom:10px;" required>
            <button type="submit" style="background:#ff5a5f; color:white; width:100%; border:none; padding:10px; border-radius:20px; font-weight:bold; cursor:pointer;">Post it!</button>
        </form>
    </div>

    <!-- Main Inventory Grid -->
    <div style="flex: 1; margin-left: 20px;">
        <h1>Inventory</h1>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px;">
            {% if cars %}
                {% for car in cars %}
                <div style="border: 1px solid #eee; border-radius: 12px; overflow: hidden; position: relative;">
                    <img src="{{ url_for('uploaded_file', filename=car.image_path.split(',')[0]) }}" style="width:100%; height:220px; object-fit:cover;">
                    <div style="background:#ff5a5f; color:white; position:absolute; bottom:60px; left:10px; padding:2px 8px; border-radius:4px; font-weight:bold;">
                        ${{ "{:,}".format(car.price or 0) }}
                    </div>
                    <div style="padding:10px;">
                        <strong>{{ car.make }}</strong>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <p>No listings found yet. 🚗 Be the first to post!</p>
            {% endif %}
        </div>
    </div>
{% endblock %}
